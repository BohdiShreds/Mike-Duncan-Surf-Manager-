.container { padding: 20px; max-width: 800px; margin:auto; }
.card {
  background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,.15);
  border-radius: 16px; padding: 20px; backdrop-filter: blur(6px);
}
button {
  display:block; width:100%; margin:10px 0; padding:14px;
  border:none; border-radius:12px; font-size:16px; font-weight:bold;
  background: linear-gradient(90deg,#f4a261,#e76f51); color:#fff;
}
#stokeWrap { background:#333; border-radius:12px; overflow:hidden; height:22px; }
#stokeBar { height:100%; width:100%; background: linear-gradient(90deg,#2a9d8f,#e9c46a); }
.small { opacity:.85; font-size:14px; }
.popup {
  position: fixed; inset:0; display:none; align-items:center; justify-content:center;
  background: rgba(0,0,0,.75); z-index:10;
}
.popup-content {
  background:#7f1d1d; padding:30px; border-radius:18px; text-align:center;
  box-shadow:0 0 20px rgba(255,80,80,.5);
}
</style>
</head>
<body>
<div id="hero">
  <h1>🏄 Mike Duncan: Surf Manager</h1>
  <p>Read the report. Pick the right break. Avoid being a kook.</p>
</div>

<div class="container">
  <div class="card">
    <div><strong>Stoke</strong></div>
    <div id="stokeWrap"><div id="stokeBar"></div></div>
    <p class="small">High stoke = good calls, clean lines, happy crew.</p>
    <h2 id="question"></h2>
    <p id="report"></p>
    <div id="choices"></div>
    <p id="progress"></p>
  </div>
</div>

<div class="popup" id="kookPopup">
  <div class="popup-content">
    <h2>KOOK ALERT 🤙</h2>
    <p>That was the worst possible call.</p>
    <button onclick="closePopup()">Recover Your Stoke</button>
  </div>
</div>

<script>
const questions = [
  {
    spotReport: "6ft W swell, light SE offshore wind, mid tide, long-period groundswell.",
    question: "Best call for North Cornwall?",
    choices: [
      {text:"Fistral Beach, Newquay", score: 20},
      {text:"Polzeath", score: 10},
      {text:"Bude Sea Pool", score: -20, worst:true}
    ]
  },
  {
    spotReport: "2ft weak swell, onshore SW winds, high tide and messy chop.",
    question: "Where do you send the team?",
    choices: [
      {text:"Widemouth Bay for a grovel", score: 10},
      {text:"Porthleven reef", score: -5},
      {text:"Croyde on full exposure", score: -20, worst:true}
    ]
  },
  {
    spotReport: "Solid 8ft NW swell, strong offshore E winds, experienced surfers only.",
    question: "Best advanced call?",
    choices: [
      {text:"Porthleven", score: 20},
      {text:"Saunton Sands", score: 8},
      {text:"Beginner lesson at Woolacombe", score: -20, worst:true}
    ]
  },
  {
    spotReport: "3ft clean peelers, light offshore, low tide banks firing.",
    question: "Best longboard session?",
    choices: [
      {text:"Saunton Sands", score: 20},
      {text:"Watergate Bay", score: 12},
      {text:"Lynmouth rocks", score: -20, worst:true}
    ]
  },
  {
    spotReport: "Huge 10ft storm swell, cross-shore wind, dangerous currents.",
    question: "Final decision?",
    choices: [
      {text:"Call it off and wait for the window", score: 20},
      {text:"Send only the chargers to Putsborough", score: 5},
      {text:"Take beginners out at Croyde", score: -20, worst:true}
    ]
  }
];

let current = 0;
let score = 0;
let stoke = 100;

function renderQuestion() {
  if(current >= questions.length) {
    document.querySelector('.card').innerHTML = `
      <h2>Session Complete 🌊</h2>
      <p>Final Stoke: ${stoke}</p>
      <p>Final Score: ${score + stoke}</p>
      <p>${score + stoke >= 180 ? "Legendary surf manager." : "Not bad, but watch the charts more closely."}</p>
    `;
    return;
  }

  const q = questions[current];
  document.getElementById('question').textContent = q.question;
  document.getElementById('report').textContent = q.spotReport;
  document.getElementById('progress').textContent = `Question ${current+1} of ${questions.length}`;

  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  q.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.textContent = choice.text;
    btn.onclick = () => selectChoice(choice);
    choicesDiv.appendChild(btn);
  });
  updateStoke();
}

function selectChoice(choice) {
  score += choice.score;
  stoke = Math.max(0, Math.min(100, stoke + choice.score));
  if(choice.worst) document.getElementById('kookPopup').style.display = 'flex';
  current++;
  renderQuestion();
}

function updateStoke() {
  document.getElementById('stokeBar').style.width = stoke + '%';
}

function closePopup() {
  document.getElementById('kookPopup').style.display = 'none';
}

renderQuestion();
</script>
</body>
</html>
